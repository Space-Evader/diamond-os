<!DOCTYPE html>
<html>
<head>
  <title>Pinky's Space — Diamond OS</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    h1 { font-size: 3em; }
    .section { margin: 40px 0; }
    .signal {
      margin: 20px auto;
      padding: 10px;
      border-bottom: 1px solid #444;
      max-width: 600px;
    }
  </style>
</head>

<body>

<h1>💎 Pinky's Space</h1>
<p>The Creative Hub of Diamond Minds</p>

<div class="section">
  <h2>🧢 HatsRx</h2>
  <p>Prescription hats for the mind</p>
</div>

<div class="section">
  <h2>🎾 TennisMoon</h2>
  <p>We orbit tennis</p>
</div>

<div class="section">
  <h2>🏍️ Disco Duo Moto</h2>
  <p>Spreading joy through movement</p>
</div>

<div class="section">
  <h2>🌀 Signals</h2>
  <div id="signals"></div>
</div>

<script>
fetch('content/signals.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('signals');
    data.forEach(signal => {
      const div = document.createElement('div');
      div.className = 'signal';
      div.innerHTML = `<h3>${signal.title}</h3><p>${signal.content}</p>`;
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
